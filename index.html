<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>短跑起跑反应训练</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #222;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            cursor: pointer;
            transition: background-color 0.1s ease;
            overflow: hidden; /* 防止空格键引起页面滚动 */
        }

        #status {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        #instruction {
            font-size: 1.2rem;
            color: #aaa;
            text-align: center;
        }

        .bg-idle { background-color: #222 !important; }
        .bg-marks { background-color: #1E88E5 !important; color: white !important;} 
        .bg-set { background-color: #FFB300 !important; color: #222 !important;}   
        .bg-go { background-color: #43A047 !important; color: white !important;}    
        .bg-false { background-color: #E53935 !important; color: white !important;} 
    </style>
</head>
<body class="bg-idle" id="screen">

    <div id="status">点击屏幕或按空格键开始</div>
    <div id="instruction">（支持手机触屏 / 电脑鼠标 / 空格键）</div>

    <script>
        let currentState = 'IDLE'; 
        let gunFiredTime = 0;
        let timeoutMarks = null;
        let timeoutSet = null;
        let isAudioUnlocked = false; // 用于记录音频是否已解锁

        const screen = document.getElementById('screen');
        const statusText = document.getElementById('status');
        const instructionText = document.getElementById('instruction');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // 解锁音频和语音引擎 (针对移动端限制)
        function unlockAudioEngine() {
            if (isAudioUnlocked) return;
            
            // 1. 解锁 Web Audio (枪声)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 2. 解锁 Web Speech (语音) - 播放一段完全静音的空白语音
            const silentUtterance = new SpeechSynthesisUtterance('');
            silentUtterance.volume = 0;
            window.speechSynthesis.speak(silentUtterance);

            isAudioUnlocked = true;
        }

        // 语音播报：沉稳发令员
        function speak(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8; // 语速慢
            utterance.pitch = 0.9; // 音调低
            utterance.volume = 1; // 恢复正常音量
            window.speechSynthesis.speak(utterance);
        }

        // 合成真实的爆破枪声 (白噪声 + 低频冲击波)
        function playGunshot() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const time = audioCtx.currentTime;

            // 1. 生成白噪声 (火药爆破)
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 2500; 

            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(1.5, time);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.25);

            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start(time);

            // 2. 生成低频冲击波 (沉闷的厚重感)
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(10, time + 0.1);

            const oscGain = audioCtx.createGain();
            oscGain.gain.setValueAtTime(1.5, time);
            oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);

            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + 0.3);
        }

        // 统一的处理逻辑 (不论是点击还是按键，都走这里)
        function handleTrigger() {
            unlockAudioEngine(); // 尝试解锁引擎

            if (currentState === 'IDLE' || currentState === 'RESULT') {
                startSequence();
            } else if (currentState === 'MARKS' || currentState === 'SET') {
                falseStart();
            } else if (currentState === 'GO') {
                calculateReaction();
            }
        }

        // --- 事件监听区 ---

        // 1. 监听屏幕触摸 / 鼠标点击
        window.addEventListener('pointerdown', (e) => {
            // 排除鼠标右键
            if (e.button === 2) return; 
            handleTrigger();
        });

        // 2. 监听键盘空格键
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault(); // 阻止空格键使页面向下滚动的默认行为
                
                // 如果用户一直按住空格键不松手，会连续触发 keydown，这里用 e.repeat 过滤掉
                if (!e.repeat) {
                    handleTrigger();
                }
            }
        });

        // --- 核心流程控制 ---

        function startSequence() {
            currentState = 'MARKS';
            updateUI('各就位...', 'bg-marks', '');
            speak('各就位');

            timeoutMarks = setTimeout(() => {
                currentState = 'SET';
                updateUI('预备...', 'bg-set', '保持静止！');
                speak('预备');

                // 预备到枪响：随机 0.5秒 到 2.4秒
                const randomDelay = Math.random() * (2400 - 500) + 500;
                
                timeoutSet = setTimeout(() => {
                    fireGun();
                }, randomDelay);

            }, 3000); 
        }

        function fireGun() {
            currentState = 'GO';
            playGunshot();
            gunFiredTime = performance.now(); 
            updateUI('跑！', 'bg-go', '点击或按空格键');
        }

        function calculateReaction() {
            const reactionTime = performance.now() - gunFiredTime;
            currentState = 'RESULT';
            
            const formattedTime = (reactionTime / 1000).toFixed(3);
            
            let evaluation = "";
            if (reactionTime < 100) {
                evaluation = "（压枪！可能犯规）";
            } else if (reactionTime < 150) {
                evaluation = "（世界级反应！）";
            } else if (reactionTime < 200) {
                evaluation = "（非常优秀）";
            } else if (reactionTime < 300) {
                evaluation = "（良好）";
            } else {
                evaluation = "（需要提高）";
            }

            updateUI(`反应时间: ${formattedTime} 秒`, 'bg-idle', `${evaluation} - 点击或按空格继续`);
        }

        function falseStart() {
            clearTimeout(timeoutMarks);
            clearTimeout(timeoutSet);
            window.speechSynthesis.cancel();
            
            currentState = 'RESULT';
            speak('抢跑');
            updateUI('抢跑！', 'bg-false', '点击或按空格重新开始');
        }

        function updateUI(mainText, bgColorClass, subText) {
            statusText.innerText = mainText;
            instructionText.innerText = subText;
            screen.className = bgColorClass;
        }
    </script>
</body>
</html>
