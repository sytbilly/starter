<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>短跑起跑反应训练</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #222;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            cursor: pointer;
            transition: background-color 0.1s ease;
            overflow: hidden; /* 防止空格键引起页面滚动 */
        }

        #status {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        #instruction {
            font-size: 1.2rem;
            color: #aaa;
            text-align: center;
        }

        .bg-idle { background-color: #222 !important; }
        .bg-marks { background-color: #1E88E5 !important; color: white !important;} 
        .bg-set { background-color: #FFB300 !important; color: #222 !important;}   
        .bg-go { background-color: #43A047 !important; color: white !important;}    
        .bg-false { background-color: #E53935 !important; color: white !important;} 
    </style>
</head>
<body class="bg-idle" id="screen">

    <div id="status">点击屏幕或按空格键开始</div>
    <div id="instruction">（支持手机触屏 / 电脑鼠标 / 空格键）</div>

    <script>
        let currentState = 'IDLE'; 
        let gunFiredTime = 0;
        let timeoutMarks = null;
        let timeoutSet = null;
        let isAudioUnlocked = false;

        const screen = document.getElementById('screen');
        const statusText = document.getElementById('status');
        const instructionText = document.getElementById('instruction');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // 新增：三段音频文件
        const sfxOnYourMark = new Audio('onyourmark.wav');
        const sfxSet = new Audio('set.wav');
        const sfxGunshot = new Audio('gunshot.wav');

        [sfxOnYourMark, sfxSet, sfxGunshot].forEach(a => {
            a.preload = 'auto';
        });

        // 新增：统一播放函数
        function playClip(audio) {
            audio.currentTime = 0;
            const p = audio.play();
            if (p && typeof p.catch === 'function') {
                p.catch(() => {});
            }
        }

        // 修改：移动端音频解锁（对 HTMLAudio 也做 warmup）
        async function unlockAudioEngine() {
            if (isAudioUnlocked) return;

            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            const list = [sfxOnYourMark, sfxSet, sfxGunshot];
            for (const a of list) {
                try {
                    a.muted = true;
                    await a.play();
                    a.pause();
                    a.currentTime = 0;
                    a.muted = false;
                } catch (_) {}
            }

            isAudioUnlocked = true;
        }

        function handleTrigger() {
            unlockAudioEngine();

            if (currentState === 'IDLE' || currentState === 'RESULT') {
                // 首次加载时延迟 100ms，确保音频引擎彻底准备好
                const delay = isAudioUnlocked ? 0 : 100;
                setTimeout(() => {
                    startSequence();
                }, delay);
            } else if (currentState === 'MARKS' || currentState === 'SET') {
                falseStart();
            } else if (currentState === 'GO') {
                calculateReaction();
            }
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.button === 2) return; 
            handleTrigger();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                if (!e.repeat) {
                    handleTrigger();
                }
            }
        });

        function startSequence() {
            currentState = 'MARKS';
            updateUI('各就位...', 'bg-marks', '');
            playClip(sfxOnYourMark); // 原 speak('各就位')

            timeoutMarks = setTimeout(() => {
                currentState = 'SET';
                updateUI('预备...', 'bg-set', '保持静止！');
                playClip(sfxSet); // 原 speak('预备')

                const randomDelay = Math.random() * (2400 - 500) + 500;
                timeoutSet = setTimeout(() => {
                    fireGun();
                }, randomDelay);

            }, 3000); 
        }

        // 修改：枪声改为文件
        function fireGun() {
            currentState = 'GO';
            playClip(sfxGunshot); // 原 playGunshot()
            gunFiredTime = performance.now(); 
            updateUI('跑！', 'bg-go', '点击或按空格键');
        }

        function calculateReaction() {
            const reactionTime = performance.now() - gunFiredTime;
            currentState = 'RESULT';
            
            const formattedTime = (reactionTime / 1000).toFixed(3);
            
            let evaluation = "";
            if (reactionTime < 100) {
                evaluation = "（压枪！可能犯规）";
            } else if (reactionTime < 150) {
                evaluation = "（世界级反应！）";
            } else if (reactionTime < 200) {
                evaluation = "（非常优秀）";
            } else if (reactionTime < 300) {
                evaluation = "（良好）";
            } else {
                evaluation = "（需要提高）";
            }

            updateUI(`反应时间: ${formattedTime} 秒`, 'bg-idle', `${evaluation} - 点击或按空格继续`);
        }

        function falseStart() {
            clearTimeout(timeoutMarks);
            clearTimeout(timeoutSet);
            
            currentState = 'RESULT';
            updateUI('抢跑！', 'bg-false', '点击或按空格重新开始');
        }

        function updateUI(mainText, bgColorClass, subText) {
            statusText.innerText = mainText;
            instructionText.innerText = subText;
            screen.className = bgColorClass;
        }
    </script>
</body>
</html>
